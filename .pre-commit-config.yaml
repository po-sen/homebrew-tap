default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: validate-tracked-packages
        name: validate tracking yaml
        entry: ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path) }'
        language: system
        files: ^(config/tracked-packages|data/upstream-versions)\.yml$

      - id: validate-tracked-versions-script
        name: validate tracked versions script
        entry: ruby -c script/tracked-versions
        language: system
        pass_filenames: false
        files: ^script/tracked-versions$

      - id: validate-extract-minor-formulae-script
        name: validate extract minor formulae script
        entry: ruby -c script/extract-minor-formulae
        language: system
        pass_filenames: false
        files: ^script/extract-minor-formulae$

      - id: validate-versioned-formulae-script
        name: validate versioned formulae script
        entry: ruby -c script/check-versioned-formulae
        language: system
        pass_filenames: false
        files: ^script/check-versioned-formulae$

      - id: check-versioned-formulae
        name: check versioned formulae
        entry: script/check-versioned-formulae
        language: system
        pass_filenames: false
        files: ^(Formula/.*@.*\.rb|config/tracked-packages\.yml|data/upstream-versions\.yml|script/check-versioned-formulae)$

      - id: validate-update-version-catalog-script
        name: validate update version catalog script
        entry: ruby -c script/update-version-catalog
        language: system
        pass_filenames: false
        files: ^script/update-version-catalog$

      - id: validate-version-tracker-library
        name: validate version tracker library
        entry: ruby -c lib/version_tracker.rb
        language: system
        pass_filenames: false
        files: ^lib/version_tracker\.rb$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
