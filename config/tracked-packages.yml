schema_version: 1
tap: po-sen/tap
version_catalog: data/upstream-versions.yml

defaults:
  version_source: github_tags
  release_policy: stable_semver_tags
  formula_policy: primary_plus_minor_latest

packages:
  asdf:
    display_name: asdf
    homepage: https://asdf-vm.com/
    upstream:
      github: asdf-vm/asdf
      tag_pattern: '^v?(?<version>\d+\.\d+\.\d+)$'
    formulae:
      primary: asdf
      pinned: []
    policy:
      track_upstream_versions: all
      notes:
        - Keep the unversioned formula aligned with the default version that should be installed by `brew install asdf`.
        - Keep versioned formulae for the latest patch release of each upstream minor version.

  neovim:
    display_name: Neovim
    homepage: https://neovim.io/
    upstream:
      github: neovim/neovim
      tag_pattern: '^v?(?<version>\d+\.\d+\.\d+)$'
    formulae:
      primary: neovim
      pinned: []
    policy:
      track_upstream_versions: all
      notes:
        - Neovim formula updates must also review bundled tree-sitter parser resources.
        - Keep versioned formulae for the latest patch release of each upstream minor version.
